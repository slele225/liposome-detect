# EXP 2 — per-sample independent calibration study.
#
# Mode: per_sample. Each of the six biological samples is calibrated
# INDEPENDENTLY (NOT jointly): its own gain/PSF measurement, its own Optuna
# search. Lipid-only, detection-free, default discrepancy weights (no
# `discrepancy:` block -> the defaults in src/calibration/discrepancy.py).
#
# Folder layout assumed: every sample has standardized `images/` and
# `dark_frames/` subfolders. NOTE (case-sensitive Linux VM): the endophilin
# datasets ship as `Images/` and `Dark_frames/` in some checkouts; rename them
# to lowercase `images/` and `dark_frames/` on the VM or the loader will not
# find them. (On case-insensitive Windows this resolves either way.)
#
# Run: experiments/2026-06-03_per-sample-calibration/run.sh [n_workers]
mode: per_sample
output_dir: experiments/2026-06-03_per-sample-calibration
n_trials: 200
n_sim_per_trial: 30
val_fraction: 0.2
seed: 0

samples:
  - name: 20nM_EGFP
    image_dir: data/20nM_EGFP/images
    dark_dir: data/20nM_EGFP/dark_frames
    dls_path: data/20nM_EGFP/batch1_dls_corrected.xlsx
  - name: 50nM_EGFP
    image_dir: data/50nM_EGFP/images
    dark_dir: data/50nM_EGFP/dark_frames
    dls_path: data/50nM_EGFP/batch1_dls_corrected.xlsx
  - name: 100nM_EGFP
    image_dir: data/100nM_EGFP/images
    dark_dir: data/100nM_EGFP/dark_frames
    dls_path: data/100nM_EGFP/batch1_dls_corrected.xlsx
  - name: 300nM_EGFP
    image_dir: data/300nM_EGFP/images
    dark_dir: data/300nM_EGFP/dark_frames
    dls_path: data/300nM_EGFP/batch1_dls_corrected.xlsx
  - name: 25nM_endophilin
    image_dir: data/25nM_endophilin/images
    dark_dir: data/25nM_endophilin/dark_frames
    dls_path: "data/25nM_endophilin/Ternary 0.5% PEGB.xlsx"
  - name: 300nM_endophilin
    image_dir: data/300nM_endophilin/images
    dark_dir: data/300nM_endophilin/dark_frames
    dls_path: "data/300nM_endophilin/Ternary 0.5% PEGB.xlsx"

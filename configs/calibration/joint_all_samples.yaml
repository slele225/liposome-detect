# Joint calibration across all 6 biological samples (4 EGFP + 2 endophilin).
# Lipid-only, detection-free calibration on the center-256 crop.
# Output: calibrations/joint_all_samples/calibration_results.json
#
# Microscope (shared) parameters fitted jointly across all samples:
#   lipid_brightness, psf_sigma_x, psf_sigma_y, psf_theta (lipid PSF), gain,
#   enf, optical_bg_lipid.
# Per-sample free: spot_density.
# Per-sample pinned: dark_results.{offset,read_noise_var} (lipid + protein).
output_dir: calibrations/joint_all_samples
n_trials: 400
n_sim_per_trial: 30
val_fraction: 0.2
seed: 0

# Optional per-term weighting of the real-vs-sim lipid discrepancy loss. If this
# block is omitted entirely, the defaults below are used. Each term takes
# {enabled, weight}; an enabled term contributes weight * raw_term, a disabled
# term is skipped. mean_pixel/quantiles/skewness are all relative squared
# errors, so weight 1.0 puts them on the same scale. Uncomment to re-weight or
# ablate terms.
#
# discrepancy:
#   pixel_hist: {enabled: true,  weight: 0.01}   # pixel-intensity Wasserstein
#   psd:        {enabled: true,  weight: 1.0}    # log radial PSD MSE
#   mean_pixel: {enabled: true,  weight: 1.0}    # relative SE of mean pixel
#   quantiles:  {enabled: true,  weight: 1.0}    # rel. SE of 99th & 99.9th pctl
#   skewness:   {enabled: true,  weight: 1.0}    # relative SE of pixel skewness

samples:
  - name: 20nM_EGFP
    image_dir: data/20nM_EGFP/images
    dark_dir: data/20nM_EGFP/dark_frames
    dls_path: data/20nM_EGFP/batch1_dls_corrected.xlsx
  - name: 50nM_EGFP
    image_dir: data/50nM_EGFP/images
    dark_dir: data/50nM_EGFP/dark_frames
    dls_path: data/50nM_EGFP/batch1_dls_corrected.xlsx
  - name: 100nM_EGFP
    image_dir: data/100nM_EGFP/images
    dark_dir: data/100nM_EGFP/dark_frames
    dls_path: data/100nM_EGFP/batch1_dls_corrected.xlsx
  - name: 300nM_EGFP
    image_dir: data/300nM_EGFP/images
    dark_dir: data/300nM_EGFP/dark_frames
    dls_path: data/300nM_EGFP/batch1_dls_corrected.xlsx
  - name: 25nM_endophilin
    image_dir: data/25nM_endophilin/images
    dark_dir: data/25nM_endophilin/dark_frames
    dls_path: data/25nM_endophilin/Ternary 0.5% PEGB.xlsx
    n_frames_for_calibration: 20
  - name: 300nM_endophilin
    image_dir: data/300nM_endophilin/images
    dark_dir: data/300nM_endophilin/dark_frames
    dls_path: data/300nM_endophilin/Ternary 0.5% PEGB.xlsx
    n_frames_for_calibration: 20

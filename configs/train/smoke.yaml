# Tiny training smoke — verifies the whole loop + the decode OUTPUT SCHEMA.
#   python -m src.train.train --config configs/train/smoke.yaml --smoke
# Needs a small Prompt-1 dataset at data.dataset (generate it first, e.g.
#   python -m src.generator.generate --config configs/generator/smoke.yaml).
name: train_smoke
seed: 0
epochs: 2
batch_size: 2
nll_warmup_epochs: 1
resume: false

data:
  dataset: datasets/smoke
  val_fraction: 0.25
  norm_mean: [198.0, 298.0]            # measured on datasets/smoke
  norm_std: [102.0, 342.0]

model:
  backbone:
    type: hrnet
    variant: hrnet_w18_small_v2
    out_index: 1
    pretrained: false
  head_hidden: 32
  heatmap_prior: 0.01
  lipid_init_flux: 5000.0
  protein_init_flux: 3000.0

targets:
  heatmap_sigma: 1.0

optim:
  lr: 2.0e-4
  weight_decay: 1.0e-4
  lr_warmup_frac: 0.1
  grad_clip: 5.0

loss:
  weights: {w_hm: 1.0, w_off: 1.0, w_lip: 1.0, w_pro: 1.0}
  focal_alpha: 2.0
  focal_beta: 4.0
  eps_lipid: 50.0
  eps_protein: 30.0
  beta_nll: 0.0
  size_weight: {d_ref: 100.0, w_max: 5.0}

eval:
  match_radius: 4.0

decode:
  score_threshold: 0.2
  nms_kernel: 3
  max_detections: 2000

smoke:
  epochs: 2
  nll_warmup_epochs: 1
  batch_size: 2
  max_images: 8
